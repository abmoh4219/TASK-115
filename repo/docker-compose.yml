version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    container_name: harborpoint-app
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: harborpoint-tests
    profiles:
      - test

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    container_name: harborpoint-e2e
    depends_on:
      - app
    environment:
      - E2E_BASE_URL=http://app:80
    profiles:
      - e2e
